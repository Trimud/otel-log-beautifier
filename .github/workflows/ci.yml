name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Make spawn-helper executable (Unix)
        if: runner.os != 'Windows'
        run: chmod +x node_modules/node-pty/prebuilds/*/spawn-helper 2>/dev/null || true
      - run: npm test
      - run: npm run build

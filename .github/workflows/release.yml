name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.2.1 or 0.3.0-beta.1) — no leading v'
        type: string
        required: true
      dry_run:
        description: 'Build only — skip publish, commit, tag, and GitHub release'
        type: boolean
        default: false

jobs:
  validate:
    name: Validate input
    runs-on: ubuntu-latest
    steps:
      - name: Check version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$'; then
            echo "ERROR: '${{ inputs.version }}' is not a valid semver (expected X.Y.Z or X.Y.Z-prerelease)" >&2
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Both macOS targets run on Apple Silicon — node-pty ships both
          # darwin-arm64 and darwin-x64 prebuilds in its npm tarball
          - os: macos-latest
            target: darwin-arm64
          - os: macos-latest
            target: darwin-x64
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: windows-latest
            target: win32-x64
          - os: windows-11-arm
            target: win32-arm64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump versions to ${{ inputs.version }}
        shell: bash
        run: |
          npm pkg set version="${{ inputs.version }}"
          npm pkg set version="${{ inputs.version }}" -w packages/vscode
          npm pkg set version="${{ inputs.version }}" -w packages/core

      - name: Compile node-pty from source (Linux)
        if: runner.os == 'Linux'
        run: |
          cd node_modules/node-pty
          npm run build || npx node-gyp rebuild

      - name: Make spawn-helper executable (Unix)
        if: runner.os != 'Windows'
        run: chmod +x node_modules/node-pty/prebuilds/*/spawn-helper 2>/dev/null || true

      - name: Run tests
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Prepare and package vsix
        shell: bash
        run: |
          ./scripts/prepare-vsix.sh ${{ matrix.target }}
          VSCE="$GITHUB_WORKSPACE/node_modules/.bin/vsce"
          cd packages/vscode/.vsix-stage
          "$VSCE" package --target ${{ matrix.target }} --out "../otel-log-beautifier-${{ matrix.target }}-${{ inputs.version }}.vsix"

      - name: Upload vsix artifact
        uses: actions/upload-artifact@v7
        with:
          name: vsix-${{ matrix.target }}
          path: packages/vscode/*.vsix
          if-no-files-found: error
          retention-days: 7

  release:
    name: Release
    needs: build
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Download all vsix artifacts
        uses: actions/download-artifact@v8
        with:
          path: vsix-artifacts
          pattern: vsix-*
          merge-multiple: true

      - name: List artifacts
        run: ls -la vsix-artifacts/

      - name: Publish to VS Code Marketplace
        if: ${{ !contains(inputs.version, '-') }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "ERROR: VSCE_PAT secret is not set" >&2
            exit 1
          fi
          for vsix in vsix-artifacts/*.vsix; do
            echo "Publishing $vsix"
            npx @vscode/vsce publish --packagePath "$vsix"
          done

      - name: Bump versions to ${{ inputs.version }}
        run: |
          npm pkg set version="${{ inputs.version }}"
          npm pkg set version="${{ inputs.version }}" -w packages/vscode
          npm pkg set version="${{ inputs.version }}" -w packages/core
          npm install --package-lock-only --ignore-scripts

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json packages/vscode/package.json packages/core/package.json
          git commit -m "chore: release v${{ inputs.version }}"
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          git push origin main
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: vsix-artifacts/*.vsix
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(inputs.version, '-') }}
